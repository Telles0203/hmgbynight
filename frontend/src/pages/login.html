<div class="container py-5" style="max-width: 520px;">
    <div class="card bg-dark border border-danger shadow-sm">
        <div class="card-body">
            <h1 class="h4 text-light mb-3">Entrar</h1>

            <div id="loginAlert" class="alert d-none" role="alert"></div>

            <form id="loginForm" autocomplete="on">
                <div class="mb-3">
                    <label class="form-label text-secondary">E-mail</label>
                    <input
                        id="email"
                        class="form-control bg-black text-light border-secondary"
                        type="email"
                        required
                    />
                </div>

                <div class="mb-3">
                    <label class="form-label text-secondary">Senha</label>
                    <input
                        id="password"
                        class="form-control bg-black text-light border-secondary"
                        type="password"
                        required
                    />
                </div>

                <button
                    id="btnLogin"
                    class="btn btn-danger w-100"
                    type="submit"
                >
                    Entrar
                </button>

                <div class="text-center mt-3">
                    <a
                        href="#"
                        class="text-secondary"
                        onclick="event.preventDefault(); loadPage('register')"
                    >
                        Criar conta
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
