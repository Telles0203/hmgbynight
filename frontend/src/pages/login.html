<div class="d-flex justify-content-center mt-5 px-3">
  <div class="card shadow card-transparent" style="min-width: 320px; max-width: 400px; width: 100%;">
    <div class="card-header text-center bg-dark text-light">
      <h5 class="mb-0 text-blood">Login</h5>
    </div>
    <div class="card-body">
      <form>
        <div class="mb-3">
          <label for="email" class="form-label text-smoke">E-mail</label>
          <input type="email" class="form-control" id="email" placeholder="seu@email.com">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label text-smoke">Senha</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••">
        </div>

        <div class="d-grid gap-2 mt-4">
            <div>
                <button type="submit" class="btn btn-blood text-smoke">Registrar</button>
            </div>
            <div>
                <button type="submit" class="btn btn-blood text-smoke">Esqueci a senha</button>
            </div>
            <div>
                <button type="submit" class="btn btn-blood text-smoke">Entrar</button>
            </div>
        </div>
      </form>
    </div>
  </div>
</div>
