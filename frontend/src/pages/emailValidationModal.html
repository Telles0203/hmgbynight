<div class="container py-4" style="max-width: 520px;" id="emailValidationWarning">
    <div class="card bg-dark border border-danger shadow-sm">
        <div class="card-body">

            <h2 class="h5 text-danger mb-3">
                E-mail não validado
            </h2>

            <p class="text-secondary mb-3">
                Coloque o token enviado por e-mail aqui:
            </p>

            <div class="mb-3">
                <input id="emailTokenInput" class="form-control bg-black text-light border-secondary" type="text"
                    placeholder="Token de validação" />
            </div>

            <div class="d-flex gap-2">

                <button id="resendTokenButton" class="btn btn-danger w-50" type="button">
                    Enviar novo token
                </button>

                <button id="validateEmailButton" class="btn btn-danger w-50" type="button">
                    Validar e-mail
                </button>

            </div>

        </div>
    </div>
</div>
